<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ewewerban - Strona Główna</title>
    <!-- Ładowanie pikselowej czcionki w stylu Minecraft z Google Fonts -->
    <link rel="preconnect" href="https://googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    
    <style>
        /* Stylizacja ogólna w klimacie Minecraft */
        body {
            background-color: #2c2c2c; /* Ciemnoszare tło jak blok twardego kamienia */
            color: #ffffff;
            font-family: 'Press Start 2P', monospace;
            font-size: 12px;
            line-height: 1.8;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Główny kontener na treść strony */
        .container {
            flex: 1;
            max-width: 800px;
            margin: 40px auto;
            padding: 20px;
            text-align: center;
        }

        h1 {
            color: #55ff55; /* Jasnozielony kolor tekstu z Minecrafta */
            font-size: 24px;
            margin-bottom: 20px;
            text-shadow: 3px 3px #000000;
        }

        p {
            color: #aaaaaa;
            text-shadow: 2px 2px #000000;
        }

        /* STYLIZACJA PASKA XP (ZBIÓRKI) */
        .xp-container {
            margin: 50px auto 20px auto;
            max-width: 500px;
            text-align: center;
        }

        .xp-label {
            color: #55ff55; /* Kolor cyfr poziomu XP */
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 10px;
            text-shadow: 2px 2px #000000;
        }

        .xp-bar-bg {
            background-color: #1a1a1a; /* Czarne tło pustego paska */
            border: 4px solid #4a4a4a; /* Ramka paska */
            height: 20px;
            position: relative;
            image-rendering: pixelated;
        }

        .xp-bar-fill {
            background-color: #55ff55; /* Jasny zielony kolor pełnego paska XP */
            height: 100%;
            /* TUTAJ ZMIENIASZ PROCENTOWY STAN ZBIÓRKI (np. width: 45%) */
            width: 35%; 
            box-shadow: inset 0 -4px 0 #3cbe3c; /* Cień na dole paska dla efektu 3D */
            transition: width 0.5s ease-in-out;
        }

        /* Stylizacja stopki strony (Footer) */
        footer {
            background-color: #1a1a1a; /* Głęboka czerń/ciemny szary */
            border-top: 4px solid #4a4a4a; /* Charakterystyczna kwadratowa krawędź */
            padding: 30px 20px;
            text-align: center;
            margin-top: auto;
        }

        .footer-text {
            margin-bottom: 15px;
            font-size: 10px;
            color: #ffff55; /* Żółty tekst jak podpowiedzi w menu gry */
        }

        /* Pikselowy przycisk "Postaw kawę" wzorowany na interfejsie Minecraft */
        .btn-buycoffee {
            display: inline-block;
            background-color: #0d7945; /* Ciemnozielony kolor buycoffee */
            color: #ffffff;
            text-decoration: none;
            padding: 15px 25px;
            font-size: 11px;
            /* Styl krawędzi przycisku w grze: */
            border: 4px solid #000000; 
            box-shadow: inset -4px -4px #064b2b, inset 4px 4px #1db96c; 
            cursor: pointer;
            image-rendering: pixelated;
            transition: all 0.1s ease;
        }

        /* Efekt najechania myszką (Hover) */
        .btn-buycoffee:hover {
            background-color: #129656;
            box-shadow: inset -4px -4px #0d7945, inset 4px 4px #26e687;
        }

        /* Efekt kliknięcia (Active) */
        .btn-buycoffee:active {
            box-shadow: inset 4px 4px #064b2b, inset -4px -4px #1db96c;
        }
    </style>
</head>
<body>

    <!-- Główna zawartość strony Ewewerbana -->
    <div class="container">
        <h1>Witaj na stronie Ewewerban!</h1>
        <p>Tworzę materiały na YouTube oraz rozwijam artykuły na minewiki.pl.</p>
        
        <!-- SEKCJA Z PASKIEM XP -->
        <div class="xp-container">
            <!-- Tutaj wpisz swój aktualny stan zbiórki i cel kwotowy -->
            <div class="xp-label">CEL: PIERWSZE PC (350 / 1000 zł)</div>
            <div class="xp-bar-bg">
                <div class="xp-bar-fill"></div>
            </div>
        </div>
    </div>

    <!-- Stopka z pikselowym przyciskiem wpłaty -->
    <footer>
        <div class="footer-text">Podoba Ci się moja twórczość? Wesprzyj moją zbiórkę!</div>
        <!-- PAMIĘTAJ: Podmień 'TUTAJ_TWÓJ_LINK' na swój adres z buycoffee.to -->
        <a href="https://buycoffee.to/ewewerban" target="_blank" class="btn-buycoffee">
            ☕ POSTAW KAWĘ
        </a>
    </footer>

</body>
</html>
