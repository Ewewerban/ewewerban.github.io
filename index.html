<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ewewerban - Home</title>
    <!-- Loading Minecraft pixel font from Google Fonts -->
    <link rel="preconnect" href="https://googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    
    <style>
        /* General styling in Minecraft theme */
        body {
            background-color: #2c2c2c; /* Dark gray background like stone */
            color: #ffffff;
            font-family: 'Press Start 2P', monospace;
            font-size: 12px;
            line-height: 1.8;
            margin: 0 0 250px 0; /* Added bottom margin to reserve space for the fixed footer */
            padding: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Main content container */
        .container {
            flex: 1;
            max-width: 800px;
            margin: 40px auto;
            padding: 20px;
            text-align: center;
        }

        h1 {
            color: #55ff55; /* Light green text color from Minecraft */
            font-size: 24px;
            margin-bottom: 20px;
            text-shadow: 3px 3px #000000;
        }

        p {
            color: #aaaaaa;
            text-shadow: 2px 2px #000000;
        }

        /* XP PROGRESS BAR STYLING */
        .xp-container {
            margin: 50px auto 20px auto;
            max-width: 500px;
            text-align: center;
        }

        .xp-label {
            color: #55ff55; /* XP level number color */
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 10px;
            text-shadow: 2px 2px #000000;
        }

        .xp-bar-bg {
            background-color: #1a1a1a; /* Black background of empty bar */
            border: 4px solid #4a4a4a; /* Bar border */
            height: 20px;
            position: relative;
            image-rendering: pixelated;
        }

        .xp-bar-fill {
            background-color: #55ff55; /* Light green color of full XP bar */
            height: 100%;
            /* UPDATE YOUR GOAL PERCENTAGE HERE (e.g., width: 35%) */
            width: 35%; 
            box-shadow: inset 0 -4px 0 #3cbe3c; /* 3D bottom shadow effect */
            transition: width 0.5s ease-in-out;
        }

        /* Footer styling - Fixed to the very bottom of the screen */
        footer {
            background-color: #1a1a1a; /* Deep black/dark gray */
            border-top: 4px solid #4a4a4a; /* Square pixel edge */
            padding: 20px;
            text-align: center;
            width: 100%;
            box-sizing: border-box; /* Prevents horizontal scrolling issues */
            display: flex;
            flex-direction: column;
            align-items: center; /* Center widget vertically and horizontally */
            
            /* Pin the footer to the bottom */
            position: fixed;
            bottom: 0;
            left: 0;
            z-index: 1000;
        }

        .footer-text {
            margin-bottom: 15px;
            font-size: 10px;
            color: #ffff55; /* Yellow text like splash text in game menu */
        }
    </style>
</head>
