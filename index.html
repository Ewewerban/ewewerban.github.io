<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ewewerban - Strona Główna</title>
    <!-- Ładowanie pikselowej czcionki w stylu Minecraft z Google Fonts -->
    <link rel="preconnect" href="https://googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    
    <style>
        /* Stylizacja ogólna w klimacie Minecraft */
        body {
            background-color: #2c2c2c; /* Ciemnoszare tło jak blok twardego kamienia */
            color: #ffffff;
            font-family: 'Press Start 2P', monospace;
            font-size: 12px;
            line-height: 1.8;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Główny kontener na treść strony */
        .container {
            flex: 1;
            max-width: 800px;
            margin: 40px auto;
            padding: 20px;
            text-align: center;
        }

        h1 {
            color: #55ff55; /* Jasnozielony kolor tekstu z Minecrafta */
            font-size: 24px;
            margin-bottom: 20px;
            text-shadow: 3px 3px #000000;
        }

        p {
            color: #aaaaaa;
            text-shadow: 2px 2px #000000;
        }

        /* Stylizacja stopki strony (Footer) */
        footer {
            background-color: #1a1a1a; /* Głęboka czerń/ciemny szary */
            border-top: 4px solid #4a4a4a; /* Charakterystyczna kwadratowa krawędź */
            padding: 30px 20px;
            text-align: center;
            margin-top: auto;
        }

        .footer-text {
            margin-bottom: 15px;
            font-size: 10px;
            color: #ffff55; /* Żółty tekst jak podpowiedzi w menu gry */
        }

        /* Pikselowy przycisk "Postaw kawę" wzorowany na interfejsie Minecraft */
        .btn-buycoffee {
            display: inline-block;
            background-color: #0d7945; /* Ciemnozielony kolor buycoffee */
            color: #ffffff;
            text-decoration: none;
            padding: 15px 25px;
            font-size: 11px;
            /* Styl krawędzi przycisku w grze: */
            border: 4px solid #000000; 
            box-shadow: inset -4px -4px #064b2b, inset 4px 4px #1db96c; 
            cursor: pointer;
            image-rendering: pixelated;
            transition: all 0.1s ease;
        }

        /* Efekt najechania myszką (Hover) - podświetlenie jak w menu */
        .btn-buycoffee:hover {
            background-color: #129656;
            box-shadow: inset -4px -4px #0d7945, inset 4px 4px #26e687;
        }

        /* Efekt kliknięcia (Active) */
        .btn-buycoffee:active {
            box-shadow: inset 4px 4px #064b2b, inset -4px -4px #1db96c;
        }
    </style>
</head>
<body>

    <!-- Główna zawartość Twojej przyszłej strony -->
    <div class="container">
        <h1>Witaj na stronie Ewewerban!</h1>
        <p>Tworzę materiały na YouTube oraz rozwijam artykuły na minewiki.pl.</p>
        <p>Strona jest obecnie w budowie... Zajrzyj tu po moich wakacjach!</p>
    </div>

    <!-- Stopka z pikselowym przyciskiem wpłaty -->
    <footer>
        <div class="footer-text">Podoba Ci się moja twórczość? Wesprzyj zbiórkę na nowy PC!</div>
        <!-- PAMIĘTAJ: Podmień 'TUTAJ_TWÓJ_LINK' na swój dokładny adres z buycoffee.to, np. buycoffee.to/ewewerban -->
        <a href="https://buycoffee.to" target="_blank" class="btn-buycoffee">
            ☕ POSTAW KAWĘ
        </a>
    </footer>

</body>
</html>
